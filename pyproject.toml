[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  "cdk.out",
  ".venv",
  "services/nova_common_layer/python",
  "tools/novacat-tools/notebooks",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests","infra/tests", "services"]
addopts = "-q"
pythonpath = [".", "services/spectra_validator", "services/spectra_acquirer"]
