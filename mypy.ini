[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True

# Monorepo layout: tell mypy where to find first-party packages.
# - infra/         — CDK stack and constructs
# - services/      — Lambda handler packages (e.g. services/spectra_discoverer/)
# - services/nova_common_layer/python/
#                  — nova_common shared library; excluded from type-checking
#                    (it's a Lambda layer, not checked directly) but must be on
#                    mypy_path so imports resolve in the handlers that use it.
explicit_package_bases = True
mypy_path = infra:services

exclude = (cdk\.out|services/nova_common_layer|services/contracts|infra/cdk\.out|tools/)

# ---------------------------------------------------------------------------
# AWS / CDK
# ---------------------------------------------------------------------------
[mypy-aws_cdk.*]
ignore_missing_imports = True

[mypy-constructs.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-aws_lambda_powertools.*]
ignore_missing_imports = True

[mypy-aws_xray_sdk.*]
ignore_missing_imports = True

# ---------------------------------------------------------------------------
# Astronomy / science
# ---------------------------------------------------------------------------
[mypy-astropy.*]
ignore_missing_imports = True

[mypy-pyvo.*]
ignore_missing_imports = True

# ---------------------------------------------------------------------------
# Adapters (untyped third-party, already marked in source)
# ---------------------------------------------------------------------------
[mypy-adapters.*]
ignore_missing_imports = True

# ---------------------------------------------------------------------------
# Profiles (untyped third-party, already marked in source)
# ---------------------------------------------------------------------------
[mypy-profiles.*]
ignore_missing_imports = True
