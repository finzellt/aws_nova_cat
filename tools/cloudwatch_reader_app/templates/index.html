<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova Cat — Log Viewer</title>
<style>
  :root {
    --bg:          #0f1117;
    --bg-surface:  #161922;
    --bg-row-alt:  #1a1e2a;
    --bg-hover:    #222838;
    --bg-panel:    #1c2030;
    --border:      #2a2f3e;
    --text:        #c9cdd8;
    --text-muted:  #6b7280;
    --text-bright: #e5e7eb;
    --accent:      #60a5fa;
    --accent-dim:  #2563eb;

    --error:       #f87171;
    --error-bg:    rgba(248,113,113,0.08);
    --warning:     #fbbf24;
    --warning-bg:  rgba(251,191,36,0.06);
    --info:        #60a5fa;
    --debug:       #6b7280;

    --font-mono:   'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --font-sans:   -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ──────────────────────────────────────────────── */

  .header {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-bright);
    white-space: nowrap;
    letter-spacing: -0.01em;
  }

  .header h1 span { color: var(--accent); }

  .header .view-label {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .header .back-btn {
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 4px;
  }

  .header .back-btn:hover { background: var(--bg-hover); }

  /* ── Controls bar ────────────────────────────────────────── */

  .controls {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .control-group label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  select, input[type="text"], input[type="number"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus, input:focus { border-color: var(--accent-dim); }

  input[type="number"] { width: 70px; }
  input[type="text"]   { width: 220px; }

  button {
    background: var(--accent-dim);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  button:hover { background: var(--accent); color: #000; }

  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  button.secondary:hover {
    border-color: var(--text-muted);
    color: var(--text);
    background: transparent;
  }

  .spacer { flex: 1; }

  /* ── Status bar ──────────────────────────────────────────── */

  .status-bar {
    padding: 6px 24px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .status-bar .count { color: var(--text-bright); font-weight: 600; }
  .status-bar .loading { color: var(--accent); }
  .status-bar .error-msg { color: var(--error); }

  /* ── Main layout: table + detail panel ───────────────────── */

  .main-layout {
    display: flex;
    height: calc(100vh - 150px);
  }

  .table-pane {
    flex: 1;
    overflow-x: auto;
    overflow-y: auto;
    min-width: 0;
  }

  /* ── Log table ───────────────────────────────────────────── */

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  thead th {
    background: var(--bg-surface);
    color: var(--text-muted);
    font-weight: 500;
    text-align: left;
    padding: 8px 10px;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }

  thead th:hover { color: var(--text-bright); }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  thead th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }

  tbody tr:nth-child(even) { background: var(--bg-row-alt); }
  tbody tr:hover { background: var(--bg-hover); }
  tbody tr.selected { background: var(--accent-dim) !important; }

  tbody td {
    padding: 6px 10px;
    vertical-align: top;
    white-space: nowrap;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Level badges */
  .level-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .level-ERROR   { background: var(--error-bg);   color: var(--error);   }
  .level-WARNING { background: var(--warning-bg); color: var(--warning); }
  .level-INFO    { background: transparent;        color: var(--info);    }
  .level-DEBUG   { background: transparent;        color: var(--debug);   }

  tr.row-ERROR   { border-left: 3px solid var(--error); }
  tr.row-WARNING { border-left: 3px solid var(--warning); }

  /* ── Detail panel (shared style) ─────────────────────────── */

  .detail-panel {
    width: 0;
    overflow: hidden;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    transition: width 0.2s ease;
    flex-shrink: 0;
  }

  .detail-panel.open {
    width: 480px;
    overflow-y: auto;
  }

  .detail-panel-inner {
    padding: 16px;
    min-width: 480px;
  }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .detail-header h2 {
    font-size: 14px;
    color: var(--text-bright);
    font-weight: 600;
  }

  .detail-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
  }

  .detail-close:hover { color: var(--text-bright); background: transparent; }

  .detail-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .detail-actions button { font-size: 12px; padding: 5px 10px; }

  .detail-section { margin-bottom: 16px; }

  .detail-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .detail-fields {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 4px 12px;
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .detail-fields .field-name {
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .detail-fields .field-value {
    color: var(--text-bright);
    word-break: break-all;
  }

  .detail-fields .field-value.empty {
    color: var(--text-muted);
    font-style: italic;
  }

  .raw-message {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    line-height: 1.6;
  }

  /* ── Trace view ──────────────────────────────────────────── */

  .trace-view { display: none; }
  .trace-view.active { display: flex; }

  .trace-timeline {
    position: relative;
    padding-left: 20px;
    border-left: 2px solid var(--border);
    margin-left: 8px;
  }

  .trace-event {
    position: relative;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .trace-event:hover { border-color: var(--accent-dim); }
  .trace-event.trace-selected { border-color: var(--accent); }

  .trace-event::before {
    content: '';
    position: absolute;
    left: -26px;
    top: 14px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--bg-panel);
  }

  .trace-event.trace-ERROR::before   { background: var(--error); }
  .trace-event.trace-WARNING::before { background: var(--warning); }
  .trace-event.trace-INFO::before    { background: var(--accent); }

  .trace-event-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .trace-event-header .trace-ts {
    color: var(--text-muted);
    font-size: 11px;
  }

  .trace-event-meta {
    color: var(--text-muted);
    font-size: 11px;
    margin-bottom: 4px;
  }

  .trace-event-message {
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .trace-event.expanded .trace-event-message {
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Empty state ─────────────────────────────────────────── */

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
  }

  .empty-state h2 {
    font-size: 18px;
    margin-bottom: 8px;
    color: var(--text);
  }

  /* ── Auto-refresh toggle ─────────────────────────────────── */

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .toggle-wrap input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
  }

  .toggle-wrap label {
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
  }

  /* ── Toast notification ──────────────────────────────────── */

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-surface);
    border: 1px solid var(--accent-dim);
    color: var(--text-bright);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->

<div class="header">
  <h1><span>Nova Cat</span> Log Viewer</h1>
  <span class="view-label" id="view-label">Log List</span>
  <button class="back-btn" id="back-btn" style="display:none" onclick="exitTraceView()">&#8592; Back to logs</button>
  <div class="spacer"></div>
</div>

<!-- ── Controls (hidden in trace view) ─────────────────────── -->

<div class="controls" id="controls-bar">
  <div class="control-group">
    <label for="minutes">Last</label>
    <input type="number" id="minutes" value="30" min="1" max="1440">
    <label>min</label>
  </div>

  <div class="control-group">
    <label for="level-filter">Level</label>
    <select id="level-filter">
      <option value="">All</option>
      <option value="ERROR">Error</option>
      <option value="WARNING">Warning</option>
      <option value="INFO">Info</option>
      <option value="DEBUG">Debug</option>
    </select>
  </div>

  <div class="control-group">
    <label for="workflow-filter">Workflow</label>
    <select id="workflow-filter"><option value="">All</option></select>
  </div>

  <div class="control-group">
    <label for="function-filter">Function</label>
    <select id="function-filter"><option value="">All</option></select>
  </div>

  <div class="control-group">
    <label for="search-input">Search</label>
    <input type="text" id="search-input" placeholder="Filter by text...">
  </div>

  <button id="fetch-btn" onclick="fetchLogs()">Fetch Logs</button>

  <div class="spacer"></div>

  <div class="toggle-wrap">
    <input type="checkbox" id="auto-refresh">
    <label for="auto-refresh">Auto-refresh (60s)</label>
  </div>

  <button class="secondary" onclick="exportCSV()">Export CSV</button>
</div>

<div class="status-bar" id="status-bar">
  <span id="status-text">Ready — click Fetch Logs to start</span>
  <div class="spacer"></div>
  <span id="row-count"></span>
</div>

<!-- ── Main content: log list view ─────────────────────────── -->

<div class="main-layout" id="log-list-view">
  <div class="table-pane">
    <table>
      <thead><tr id="table-head"></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state">
      <h2>No logs loaded</h2>
      <p>Set your time range and click Fetch Logs.</p>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-panel-inner">
      <div class="detail-header">
        <h2>Log Entry</h2>
        <button class="detail-close" onclick="closeDetail()">&#10005;</button>
      </div>
      <div class="detail-actions" id="detail-actions"></div>
      <div class="detail-section">
        <h3>Fields</h3>
        <div class="detail-fields" id="detail-fields"></div>
      </div>
      <div class="detail-section">
        <h3>Raw Log Entry</h3>
        <div class="raw-message" id="detail-raw"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Main content: trace view ────────────────────────────── -->

<div class="main-layout trace-view" id="trace-view">
  <div class="table-pane" style="padding: 24px;">
    <div id="trace-content"></div>
  </div>

  <div class="detail-panel" id="trace-detail-panel">
    <div class="detail-panel-inner">
      <div class="detail-header">
        <h2>Log Entry</h2>
        <button class="detail-close" onclick="closeTraceDetail()">&#10005;</button>
      </div>
      <div class="detail-section">
        <h3>Fields</h3>
        <div class="detail-fields" id="trace-detail-fields"></div>
      </div>
      <div class="detail-section">
        <h3>Raw Log Entry</h3>
        <div class="raw-message" id="trace-detail-raw"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>


<script>
// ── State ───────────────────────────────────────────────────

let allRows = [];
let filteredRows = [];
let sortCol = '@timestamp';
let sortAsc = false;
let autoRefreshTimer = null;
let selectedRowIndex = -1;

const COLUMNS = [
  { key: '@timestamp',            label: 'Timestamp',   width: '170px' },
  { key: 'level',                 label: 'Level',       width: '70px'  },
  { key: 'workflow_name',         label: 'Workflow',    width: '140px' },
  { key: 'function_name',        label: 'Function',    width: '160px' },
  { key: 'state_name',           label: 'State',       width: '140px' },
  { key: 'nova_id',              label: 'Nova ID',     width: '120px' },
  { key: 'correlation_id',       label: 'Correlation', width: '120px' },
  { key: 'error_classification',  label: 'Error Class', width: '90px'  },
  { key: 'message',              label: 'Message',     width: 'auto'  },
];

// All fields shown in the detail panel (superset of table columns).
const DETAIL_FIELDS = [
  '@timestamp', 'level', 'workflow_name', 'function_name', 'state_name',
  'nova_id', 'candidate_name', 'correlation_id', 'job_run_id',
  'error_classification', 'error_fingerprint', 'attempt_number',
  'duration_ms', '@logStream', '@log',
];


// ── Init ────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  buildTableHead();
  bindControls();
  fetchLogs();
});


// ── Table header with sort ──────────────────────────────────

function buildTableHead() {
  const tr = document.getElementById('table-head');
  tr.innerHTML = '';
  for (const col of COLUMNS) {
    const th = document.createElement('th');
    th.dataset.key = col.key;
    th.style.width = col.width;
    const arrow = col.key === sortCol ? (sortAsc ? '\u25B2' : '\u25BC') : '\u2195';
    th.innerHTML = `${esc(col.label)} <span class="sort-arrow">${arrow}</span>`;
    if (col.key === sortCol) th.classList.add('sorted');
    th.addEventListener('click', () => toggleSort(col.key));
    tr.appendChild(th);
  }
}

function toggleSort(key) {
  if (sortCol === key) { sortAsc = !sortAsc; }
  else { sortCol = key; sortAsc = true; }
  buildTableHead();
  applyFiltersAndRender();
}


// ── Fetch logs from the API ─────────────────────────────────

async function fetchLogs() {
  const btn = document.getElementById('fetch-btn');
  const statusEl = document.getElementById('status-text');

  btn.disabled = true;
  btn.textContent = 'Fetching...';
  statusEl.innerHTML = '<span class="loading">Querying CloudWatch Logs Insights\u2026</span>';

  const minutes = document.getElementById('minutes').value || '30';

  try {
    const resp = await fetch(`/api/logs?minutes=${encodeURIComponent(minutes)}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    allRows = data.rows || [];
    populateDynamicFilters();
    applyFiltersAndRender();
    closeDetail();

    const groupCount = (data.log_groups || []).length;
    statusEl.textContent =
      `Loaded ${allRows.length} rows from ${groupCount} log groups (last ${data.minutes} min)`;
  } catch (err) {
    statusEl.innerHTML = `<span class="error-msg">Error: ${esc(err.message)}</span>`;
    allRows = [];
    applyFiltersAndRender();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Fetch Logs';
  }
}


// ── Dynamic filter dropdowns ────────────────────────────────

function populateDynamicFilters() {
  populateSelect('workflow-filter', uniqueVals('workflow_name'));
  populateSelect('function-filter', uniqueVals('function_name'));
}

function uniqueVals(key) {
  const vals = new Set();
  for (const row of allRows) {
    const v = (row[key] || '').trim();
    if (v) vals.add(v);
  }
  return [...vals].sort();
}

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  const current = sel.value;
  sel.innerHTML = '<option value="">All</option>';
  for (const v of values) {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  }
  if (values.includes(current)) sel.value = current;
}


// ── Client-side filtering & sorting ─────────────────────────

function applyFiltersAndRender() {
  const levelFilter    = document.getElementById('level-filter').value;
  const workflowFilter = document.getElementById('workflow-filter').value;
  const functionFilter = document.getElementById('function-filter').value;
  const searchText     = document.getElementById('search-input').value.toLowerCase().trim();

  filteredRows = allRows.filter(row => {
    if (levelFilter && (row.level || '').toUpperCase() !== levelFilter) return false;
    if (workflowFilter && row.workflow_name !== workflowFilter) return false;
    if (functionFilter && row.function_name !== functionFilter) return false;
    if (searchText) {
      const haystack = Object.values(row).join(' ').toLowerCase();
      if (!haystack.includes(searchText)) return false;
    }
    return true;
  });

  filteredRows.sort((a, b) => {
    const va = a[sortCol] || '';
    const vb = b[sortCol] || '';
    if (sortCol === 'duration_ms') {
      return sortAsc ? (parseFloat(va)||0) - (parseFloat(vb)||0)
                     : (parseFloat(vb)||0) - (parseFloat(va)||0);
    }
    const cmp = va.localeCompare(vb);
    return sortAsc ? cmp : -cmp;
  });

  renderTable();
  document.getElementById('row-count').textContent =
    filteredRows.length === allRows.length
      ? `${filteredRows.length} rows`
      : `${filteredRows.length} / ${allRows.length} rows`;
}


// ── Render table body ───────────────────────────────────────

function renderTable() {
  const tbody = document.getElementById('table-body');
  const emptyEl = document.getElementById('empty-state');

  if (filteredRows.length === 0) {
    tbody.innerHTML = '';
    emptyEl.style.display = 'block';
    if (allRows.length > 0) {
      emptyEl.querySelector('h2').textContent = 'No matching logs';
      emptyEl.querySelector('p').textContent = 'Try adjusting your filters.';
    }
    return;
  }

  emptyEl.style.display = 'none';

  const fragments = [];
  for (let i = 0; i < filteredRows.length; i++) {
    const row = filteredRows[i];
    const level = (row.level || '').toUpperCase();
    const levelClass = (level === 'ERROR' || level === 'WARNING') ? ` row-${level}` : '';
    const selClass = (i === selectedRowIndex) ? ' selected' : '';

    let cells = '';
    for (const col of COLUMNS) {
      const val = row[col.key] || '';
      if (col.key === 'level') {
        const badge = level
          ? `<span class="level-badge level-${level}">${esc(level)}</span>` : '';
        cells += `<td>${badge}</td>`;
      } else if (col.key === '@timestamp') {
        cells += `<td>${esc(formatTimestamp(val))}</td>`;
      } else {
        cells += `<td>${esc(val)}</td>`;
      }
    }
    fragments.push(`<tr class="${levelClass}${selClass}" data-idx="${i}">${cells}</tr>`);
  }

  tbody.innerHTML = fragments.join('');

  for (const tr of tbody.querySelectorAll('tr')) {
    tr.addEventListener('click', () => {
      openDetail(parseInt(tr.dataset.idx, 10));
    });
  }
}


// ── Detail panel ────────────────────────────────────────────

function openDetail(idx) {
  selectedRowIndex = idx;
  const row = filteredRows[idx];
  if (!row) return;

  // Highlight selected row
  for (const tr of document.querySelectorAll('#table-body tr')) {
    tr.classList.toggle('selected', parseInt(tr.dataset.idx, 10) === idx);
  }

  // Populate fields grid
  const fieldsEl = document.getElementById('detail-fields');
  fieldsEl.innerHTML = DETAIL_FIELDS.map(key => {
    const val = row[key] || '';
    const cls = val ? 'field-value' : 'field-value empty';
    return `<span class="field-name">${esc(key)}</span>` +
           `<span class="${cls}">${esc(val || '\u2014')}</span>`;
  }).join('');

  // Raw log entry — pretty-print JSON if possible
  const rawEl = document.getElementById('detail-raw');
  rawEl.textContent = tryPrettyJson(row['@message'] || row['message'] || '');

  // Action buttons
  const actionsEl = document.getElementById('detail-actions');
  const corrId = (row.correlation_id || '').trim();
  const jobRunId = (row.job_run_id || '').trim();
  const novaId = (row.nova_id || '').trim();

  let btns = '';
  if (corrId) {
    btns += `<button onclick="traceWorkflow('${escAttr(corrId)}')">Trace Workflow</button>`;
    btns += `<button class="secondary" onclick="copyToClipboard('${escAttr(corrId)}')">Copy Correlation ID</button>`;
  }
  if (jobRunId) {
    btns += `<button class="secondary" onclick="copyToClipboard('${escAttr(jobRunId)}')">Copy Job Run ID</button>`;
  }
  if (novaId) {
    btns += `<button class="secondary" onclick="copyToClipboard('${escAttr(novaId)}')">Copy Nova ID</button>`;
  }
  actionsEl.innerHTML = btns;

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  selectedRowIndex = -1;
  document.getElementById('detail-panel').classList.remove('open');
  for (const tr of document.querySelectorAll('#table-body tr.selected')) {
    tr.classList.remove('selected');
  }
}


// ── Trace view ──────────────────────────────────────────────

let traceRows = [];

async function traceWorkflow(correlationId) {
  const statusEl = document.getElementById('status-text');
  statusEl.innerHTML =
    `<span class="loading">Tracing correlation_id: ${esc(correlationId)}\u2026</span>`;

  try {
    const resp = await fetch(
      `/api/trace?correlation_id=${encodeURIComponent(correlationId)}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    traceRows = data.rows || [];
    showTraceView(correlationId);

    statusEl.textContent =
      `Trace: ${data.row_count} events for ${correlationId} (searched last ${data.hours_back}h)`;
  } catch (err) {
    statusEl.innerHTML = `<span class="error-msg">Trace error: ${esc(err.message)}</span>`;
  }
}

function showTraceView(correlationId) {
  document.getElementById('log-list-view').style.display = 'none';
  document.getElementById('controls-bar').style.display = 'none';
  document.getElementById('trace-view').classList.add('active');
  document.getElementById('back-btn').style.display = 'inline-block';
  document.getElementById('view-label').textContent = `Trace: ${correlationId}`;

  const container = document.getElementById('trace-content');

  if (traceRows.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h2>No events found</h2>
        <p>No logs matched this correlation_id in the last 24 hours.</p>
      </div>`;
    return;
  }

  let html = '<div class="trace-timeline">';
  for (let i = 0; i < traceRows.length; i++) {
    const row = traceRows[i];
    const level = (row.level || '').toUpperCase();
    const ts = formatTimestamp(row['@timestamp'] || '');
    const fn = row.function_name || '';
    const state = row.state_name || '';
    const wf = row.workflow_name || '';
    const msg = row.message || '';
    const errClass = row.error_classification || '';

    const meta = [wf, fn, state].filter(Boolean).join(' \u2192 ');

    html += `
      <div class="trace-event trace-${esc(level)}" data-trace-idx="${i}">
        <div class="trace-event-header">
          <span class="level-badge level-${esc(level)}">${esc(level)}</span>
          <span class="trace-ts">${esc(ts)}</span>
          ${errClass ? `<span class="level-badge level-ERROR">${esc(errClass)}</span>` : ''}
        </div>
        ${meta ? `<div class="trace-event-meta">${esc(meta)}</div>` : ''}
        <div class="trace-event-message">${esc(msg)}</div>
      </div>`;
  }
  html += '</div>';
  container.innerHTML = html;

  // Bind click on trace events
  for (const el of container.querySelectorAll('.trace-event')) {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.traceIdx, 10);
      openTraceDetail(idx, el);
    });
  }
}

function openTraceDetail(idx, el) {
  const row = traceRows[idx];
  if (!row) return;

  // Toggle expand on message
  el.classList.toggle('expanded');

  // Highlight selected
  for (const e of document.querySelectorAll('.trace-event.trace-selected')) {
    e.classList.remove('trace-selected');
  }
  el.classList.add('trace-selected');

  // Populate detail panel
  const fieldsEl = document.getElementById('trace-detail-fields');
  fieldsEl.innerHTML = DETAIL_FIELDS.map(key => {
    const val = row[key] || '';
    const cls = val ? 'field-value' : 'field-value empty';
    return `<span class="field-name">${esc(key)}</span>` +
           `<span class="${cls}">${esc(val || '\u2014')}</span>`;
  }).join('');

  const rawEl = document.getElementById('trace-detail-raw');
  rawEl.textContent = tryPrettyJson(row['@message'] || row['message'] || '');

  document.getElementById('trace-detail-panel').classList.add('open');
}

function closeTraceDetail() {
  document.getElementById('trace-detail-panel').classList.remove('open');
  for (const e of document.querySelectorAll('.trace-event.trace-selected')) {
    e.classList.remove('trace-selected');
  }
}

function exitTraceView() {
  document.getElementById('trace-view').classList.remove('active');
  document.getElementById('log-list-view').style.display = 'flex';
  document.getElementById('controls-bar').style.display = 'flex';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('view-label').textContent = 'Log List';
  closeTraceDetail();
}


// ── Helpers ─────────────────────────────────────────────────

function formatTimestamp(ts) {
  if (!ts) return '';
  return ts.replace(' ', '  ');
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escAttr(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function tryPrettyJson(str) {
  try {
    return JSON.stringify(JSON.parse(str), null, 2);
  } catch {
    return str;
  }
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  });
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}


// ── Control bindings ────────────────────────────────────────

function bindControls() {
  for (const id of ['level-filter', 'workflow-filter', 'function-filter']) {
    document.getElementById(id).addEventListener('change', applyFiltersAndRender);
  }
  document.getElementById('search-input').addEventListener('input', applyFiltersAndRender);
  document.getElementById('minutes').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') fetchLogs();
  });
  document.getElementById('auto-refresh').addEventListener('change', (e) => {
    if (e.target.checked) {
      autoRefreshTimer = setInterval(fetchLogs, 60000);
    } else {
      clearInterval(autoRefreshTimer);
      autoRefreshTimer = null;
    }
  });
}


// ── CSV export ──────────────────────────────────────────────

function exportCSV() {
  if (filteredRows.length === 0) return;
  const headers = COLUMNS.map(c => c.key);
  const lines = [headers.join(',')];
  for (const row of filteredRows) {
    const vals = headers.map(h => {
      const v = (row[h] || '').replace(/"/g, '""');
      return `"${v}"`;
    });
    lines.push(vals.join(','));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `novacat-logs-${new Date().toISOString().slice(0, 19)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
